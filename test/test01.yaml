  vars:
    build_command: "/bin/bash"
    deploy_command: "/bin/bash"
  envs:
    TERM: xterm-256color
    COLORTERM: truecolor
  seq:
    - type: run
      id: "n1"
      #on_error: "success"
      args: ["{build_command}"]
    - type: par
      id: "n2"
      on_error: "paused"
      max_proc: 2
      nodes:
        - type: par
          id: "n2-1"
          xlocks: ["x1", "x2"]
          nodes:
          - type: run
            id: "n2-1-1"
            title: "n2-1-1"
            args: [ "/bin/bash" ]
        - type: run
          id: "n2-2"
          args: [ "/bin/bash" ]
          xlocks: ["x1"]
        - type: run
          id: "n2-3"
          args: [ "/bin/bash" ]
          xlocks: ["x2"]
    - type: par
      id: "n3"
      on_error: "paused"
      max_proc: 2
      nodes:
        - type: run
          id: "n3-1"
          args: [ "/bin/bash" ]
          provides: ["n3-1"]
        - type: run
          id: "n3-2"
          args: [ "/bin/bash" ]
          requires: ["n3-1"]
        - type: run
          id: "n3-3"
          args: [ "/bin/bash" ]
    - type: run
      id: "n4"
      args: ["{deploy_command}"]
