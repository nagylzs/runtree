name: Build Runtree

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config golang libgtk-4-dev libvte-2.91-gtk4-dev

    - name: Run build script
      env:
        CGO_ENABLED: 1
      run: python3 scripts/build.py

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-amd64-binaries
        path: |
          dist/linux/amd64/rtrunner
          dist/linux/amd64/rtrunner_debug
          dist/linux/amd64/runtree
          dist/linux/amd64/runtree_debug
        if-no-files-found: error
  